# Suite of WebAssembly-emitting compilers, vendored here to be modified so the
# compiler ITSELF compiles to / runs as wasm. See candidates.md for the full
# ranking and rationale; see README.md for the workflow.
#
# status: planned -> vendored -> builds-to-wasm -> self-hosts
#   planned        not yet imported
#   vendored       pristine snapshot in compilers/<name>/src
#   builds-to-wasm produces a working compiler-as-wasm artifact
#   self-hosts     the compiler-as-wasm compiles its own source

[[compiler]]
name       = "xcc"
upstream   = "https://github.com/tyfkda/xcc"
impl_lang  = "C"
backend    = "direct"          # own wasm emitter + linker, no LLVM
tier       = 0
effort     = 2
status     = "end-to-end"     # cc.wasm compiles C -> wasm that runs
artifact   = "dist/cc.wasm"
host_deps  = ["gcc", "make", "llvm-ar"]

[[compiler]]
name       = "wa"               # 凹语言
upstream   = "https://github.com/wa-lang/wa"
impl_lang  = "Go"
backend    = "direct"          # own wasm backend, no LLVM
tier       = 0
effort     = 2
status     = "end-to-end"      # output verified byte-identical to native wa
artifact   = "dist/wa.wasm"
host_deps  = ["go>=1.17"]      # stdlib only; GOOS=wasip1 cross-compiles

[[compiler]]
name       = "waforth"
upstream   = "https://github.com/remko/waforth"
impl_lang  = "WebAssembly (wat)"
backend    = "direct"
tier       = 0
effort     = 2
status     = "end-to-end"      # assembles; REPL host runs the wasm-resident compiler
artifact   = "dist/waforth.wasm + dist/waforth"
host_deps  = ["wat2wasm", "wasmtime C-API (build-host.sh)"]

[[compiler]]
name       = "assemblyscript"
upstream   = "https://github.com/AssemblyScript/assemblyscript"
impl_lang  = "portable AssemblyScript (TS subset)"
backend    = "Binaryen shipped AS wasm (binaryen npm pkg), via C-API; no LLVM"
tier       = 0
effort     = 2
status     = "self-hosting"    # byte-identical fixed point verified; the flagship
artifact   = "dist/asc.wasm + dist/asc.wasm.js"
host_deps  = ["node>=20.19", "npm"]

[[compiler]]
name       = "zig"
upstream   = "https://github.com/ziglang/zig"
impl_lang  = "Zig"
backend    = "direct — Zig's own self-hosted backend, no LLVM"
tier       = 0
effort     = 3                 # heavy bootstrap (~10 min, ~6 GB RAM), no code changes
status     = "self-hosting"    # zig1.wasm (self-compiled to wasm) bootstraps zig2; zig2 emits wasm
artifact   = "zig1.wasm (committed) -> dist/zig2"
host_deps  = ["git", "gcc"]    # clones pinned tree for lib/src; no LLVM/node for the build

# --- next up (verified easy wins from candidates.md, not yet vendored) ---

[[compiler]]
name       = "virgil"
upstream   = "https://github.com/titzer/virgil"
impl_lang  = "Virgil"
backend    = "direct"          # self-hosting, no LLVM
tier       = 0
effort     = 2
status     = "planned"         # proven end-to-end in scratch; vendoring pending
artifact   = "dist/Aeneas.wasm"
host_deps  = ["bash"]          # bootstraps from checked-in native binary

[[compiler]]
name       = "schism"
upstream   = "https://github.com/schism-lang/schism"
impl_lang  = "Scheme"
backend    = "direct"
tier       = 0
effort     = 3                 # revived: needs a pinned Node 12, no code changes
status     = "self-hosting"    # revived under pinned Node 12; see notes.md
artifact   = "schism-stage0.wasm (committed)"
host_deps  = ["node 12 (pinned in tools/)"]

# --- vendored but blocked: native-backend dependency wall (data points) ---

[[compiler]]
name       = "webcc"
upstream   = "https://github.com/io-eric/webcc"
impl_lang  = "C++"
backend    = "own codegen + external lld"
tier       = 1
effort     = 3
status     = "vendored-blocked"  # builds native; execs lld to link -> can't run as wasm
artifact   = "(blocked)"
host_deps  = ["clang>=16", "ninja", "lld"]

[[compiler]]
name       = "basic_rs"
upstream   = "https://github.com/yiransheng/basic_rs"
impl_lang  = "Rust"
backend    = "Binaryen (binaryen crate, FFI to native C++)"
tier       = 1
effort     = 3
status     = "vendored-blocked"  # binaryen+cpuprofiler FFI don't cross-compile to wasm32
artifact   = "(blocked)"
host_deps  = ["cargo"]
